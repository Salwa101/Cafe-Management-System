<!-- coffee search start -->
 <section class="food-search">
    <div class="container">
        
        <h2 class="fill"> Please fill this form to confirm your order</h2>

        <form action="#" class="order">
            <fieldset>
                <legend>Selected coffee</legend>

                <div class="food-menu-img">
                    <img src="images/flatwhite.jpg" alt="flat white" class="img-responsive img-curve">
                </div>

                <div class="food-menu-desc">
                    <h3>flat white</h3>
                    <p class="food-price">230 BDT</p>

                    <div class="order-label">Quantity</div>
                    <input type="number" name="qty" class="input-responsive" value="1" required>
                    
                </div>

            </fieldset>
            
            <fieldset>
                <legend>Delivery Details</legend>
                <div class="order-label">Full Name</div>
                <input type="text" name="full-name" placeholder="E.g. Sara" class="input-responsive" required>

                <div class="order-label">Phone Number</div>
                <input type="tel" name="contact" placeholder="E.g. 017xxxxxxx" class="input-responsive" required>

                <div class="order-label">Email</div>
                <input type="email" name="email" placeholder="E.g.sara@gmail.com" class="input-responsive" required>

                <div class="order-label">Address</div>
                <textarea name="address" rows="6" placeholder="E.g.  City, Country" class="input-responsive" required></textarea>

                <input type="submit" name="submit" value="Confirm Order" class="btn btn-primary">
            </fieldset>

        </form>

    </div>
</section>
<!-- coffee search ends -->
