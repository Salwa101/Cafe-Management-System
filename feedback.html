<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Website</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
      <!-- navbarsection start -->
      <section class="navbar">
        <div class="container">
            <div class="logo">
                <a href="#" title="Logo">
                    <img src="images/logo.jpg" alt="coffeelogo" class="img-responsive">
                </a>
            </div>

            <div class="menu text-right">
                <ul>
                    <li>
                        <a href="index.html"><i>Homepage</i></a>
                    </li>
                    <li>
                        <a href="categories.html"><i>Categories</i></a>
                    </li>
                    <li>
                        <a href="coffee.html"><i>Coffee</i></a>
                 </li>
                    <li>
                        <a href="feedback.html"><i>Contact with us</i></a>
                    </li>
                </ul>
            </div>

            <div class="clearfix"></div>
        </div>
    </section>

    <!--navbarsection  finish-->

    <!-- Feedback Section -->
    <section class="feedback">
        <div class="container">
            <h2><i>Feedback Form</i></h2>
            <form action="feedback.html" method="POST" class="feedback-form">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="rating">Rating:</label>
                <select id="rating" name="rating" required>
                    <option value="">Select...</option>
                    <option value="5">5 - Excellent</option>
                    <option value="4">4 - Very Good</option>
                    <option value="3">3 - Good</option>
                    <option value="2">2 - Fair</option>
                    <option value="1">1 - Poor</option>
                </select>

                <label for="comments">Comments:</label>
                <textarea id="comments" name="comments" rows="4" required></textarea>

                <button type="submit" class="btn btn-primary">Submit Feedback</button>
            </form>
        </div>
    </section>
 <!-- social media start -->
 <section class="social">
    <div class="container text-center">
        <p class="connected"><i>Stay connected with us with</i></p>
        <ul>
            <li>
                <a href="#"><img src="https://img.icons8.com/fluent/50/000000/facebook-new.png"/></a>
            </li>
            <li>
                <a href="#"><img src="https://img.icons8.com/fluent/48/000000/instagram-new.png"/></a>
            </li>
            <li>
                <a href="#"><img src="https://img.icons8.com/fluent/48/000000/twitter.png"/></a>
            </li>
        </ul>
    </div>
</section>
 <!-- social media finish-->

</div>
</section>
<!-- footer Section Ends Here -->

</body>
</html>
